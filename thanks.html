<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>You're on the list · MoCa</title>
  <style>
    :root{--bg:#050404;--line-2:rgba(255,255,255,.15);--ink:#f8f4ef;--muted:#a89e97;--orange:#ef8d5c}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;color:var(--ink);
      background:radial-gradient(circle at 50% 0%, rgba(239,141,92,.15), transparent 60%), var(--bg);
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;line-height:1.5}
    .card{max-width:440px;text-align:center}
    .mark{width:64px;height:64px;margin:0 auto 24px;display:grid;place-items:center;border-radius:50%;
      background:var(--orange);font-size:32px;box-shadow:inset 0 1px 0 rgba(255,255,255,.42)}
    h1{font-size:32px;font-weight:950;letter-spacing:-.02em;margin:0 0 14px}
    p{color:var(--muted);font-size:17px;margin:0 0 28px}
    a{display:inline-flex;align-items:center;min-height:46px;padding:0 20px;border-radius:11px;
      background:var(--orange);color:#1e120c;font-weight:900;text-decoration:none}
    a:hover{filter:brightness(1.08)}
  </style>
</head>
<body>
  <div class="card">
    <div class="mark">🐣</div>
    <h1>You're on the list.</h1>
    <p>MoCa is coming soon. When your early-access invite is ready, we'll email you. That's it, no spam in between.</p>
    <a href="index.html">Back to home</a>
  </div>
</body>
</html>
